<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>OBS Overlay 2 — Match Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:transparent;font-family:'Rajdhani',sans-serif;direction:rtl;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
.panel{width:660px;background:rgba(8,9,13,0.9);border:1px solid rgba(0,212,255,0.4);border-radius:14px;overflow:hidden;backdrop-filter:blur(16px);box-shadow:0 10px 50px rgba(0,0,0,0.7);}
.hdr{background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(245,183,0,0.08));padding:12px 18px;border-bottom:1px solid rgba(0,212,255,0.25);display:flex;align-items:center;justify-content:space-between;}
.title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:#00d4ff;letter-spacing:2px;}
.subtitle{font-family:'Orbitron',monospace;font-size:10px;color:rgba(245,183,0,0.7);letter-spacing:1px;}
table{width:100%;border-collapse:collapse;}
thead th{padding:8px 14px;font-size:9px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:1.5px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06);}
thead th:first-child{text-align:right;}
tbody tr{transition:background .2s;}
tbody tr:last-child td{border-bottom:none;}
tbody td{padding:9px 14px;font-size:13px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04);color:#9ca3af;}
tbody td.name-col{text-align:right;font-weight:700;font-size:14px;color:#e8eaf0;}
tbody tr.elim td{opacity:0.4;}
.place-badge{display:inline-block;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;background:rgba(245,183,0,0.1);border:1px solid rgba(245,183,0,0.3);color:#f5b700;}
.place-badge.p1{background:rgba(245,183,0,0.22);border-color:#f5b700;box-shadow:0 0 12px rgba(245,183,0,0.3);}
.place-badge.p2{background:rgba(192,192,192,0.15);border-color:#c0c0c0;color:#c0c0c0;}
.place-badge.p3{background:rgba(205,127,50,0.15);border-color:#cd7f32;color:#cd7f32;}
.place-badge.none{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.08);color:#4b5563;}
.kills-val{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:#ff6b35;}
.pts-place{color:#00d4ff;font-size:12px;}
.pts-total{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;color:#f5b700;}
.tour-rank{font-family:'Orbitron',monospace;font-size:11px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#9ca3af;}
.tour-rank.t1{background:rgba(245,183,0,0.15);border-color:rgba(245,183,0,0.4);color:#f5b700;}
.tour-rank.t2{background:rgba(192,192,192,0.1);border-color:rgba(192,192,192,0.3);color:#c0c0c0;}
.tour-rank.t3{background:rgba(205,127,50,0.1);border-color:rgba(205,127,50,0.3);color:#cd7f32;}
.empty{padding:30px;text-align:center;color:rgba(255,255,255,0.2);font-size:14px;}
</style>
</head>
<body>
<div class="panel">
  <div class="hdr">
    <span class="title">📊 MATCH SUMMARY</span>
    <span class="subtitle" id="teamCount">TEAMS: 0</span>
  </div>
  <table>
    <thead><tr><th style="text-align:right">קבוצה</th><th>מקום</th><th>קילים</th><th>נק' מקום</th><th>סה"כ משחק</th><th>טורניר</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<script>
const PTS={1:10,2:6,3:5,4:4,5:3,6:2,7:1};
function getPts(p){return PTS[p]||0;}
let gameState = null;
const socket = io();
socket.on('update', (data) => { if(data.state) { gameState = data.state; render(); } });

function getAllTeams(state){return(state?.houses||[]).flatMap(h=>h.teams||[]);}
function getSortedByTour(all){return[...all].sort((a,b)=>{if(a.eliminated&&!b.eliminated)return 1;if(!a.eliminated&&b.eliminated)return-1;return b.totalPoints-a.totalPoints;});}
function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(){
  const all=getAllTeams(gameState);
  const byTour=getSortedByTour(all);const trMap={};byTour.forEach((t,i)=>trMap[t.id]=i+1);
  const sorted=[...all].sort((a,b)=>{if(!a.placement&&b.placement)return 1;if(a.placement&&!b.placement)return-1;if(a.placement&&b.placement)return a.placement-b.placement;return b.kills-a.kills;});
  document.getElementById('teamCount').textContent=`TEAMS: ${all.length}`;
  const tbody=document.getElementById('tbody');
  if(!sorted.length){tbody.innerHTML=`<tr><td colspan="6" class="empty">ממתין לנתונים...</td></tr>`;return;}
  tbody.innerHTML=sorted.map(t=>{
    const gp=getPts(t.placement)+t.kills;const tr=trMap[t.id]||'?';
    const pc=t.placement===1?'p1':t.placement===2?'p2':t.placement===3?'p3':t.placement?'':'none';
    const trc=tr===1?'t1':tr===2?'t2':tr===3?'t3':'';
    return`<tr class="${t.eliminated?'elim':''}"><td class="name-col">${esc(t.name)}</td><td><span class="place-badge ${pc}">${t.placement?`#${t.placement}`:'-'}</span></td><td><span class="kills-val">${t.kills}</span></td><td class="pts-place">+${getPts(t.placement)}</td><td><span class="pts-total">${gp}</span></td><td><span class="tour-rank ${trc}">#${tr}</span></td></tr>`;
  }).join('');
}
</script>
</body>
</html>
