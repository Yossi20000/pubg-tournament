<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBG TM PRO — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--bg:#0a0b0f;--bg2:#12141a;--card:#1a1d26;--gold:#f5b700;--orange:#ff6b35;--blue:#00d4ff;--green:#00ff88;--red:#ff3b5c;--text:#e8eaf0;--text2:#9ca3af;--muted:#4b5563;--border:rgba(245,183,0,0.2);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;direction:rtl;min-height:100vh;}
.hdr{background:linear-gradient(135deg,#0d0f14,#1a1d26);border-bottom:2px solid var(--gold);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(245,183,0,0.12);}
.logo{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--gold);letter-spacing:2px;text-shadow:0 0 20px rgba(245,183,0,0.4);}
.logo span{color:var(--orange);}
.conn-dot{width:10px;height:10px;border-radius:50%;background:var(--red);display:inline-block;margin-left:8px;transition:.3s;}
.conn-dot.ok{background:var(--green);}
.nav{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;}
.ntab{padding:7px 18px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
.ntab.on{background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0b0f;box-shadow:0 2px 12px rgba(245,183,0,0.4);}
.ntab:hover:not(.on){background:var(--card);color:var(--text);}
.main{padding:20px 28px;}
.abar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.btn{padding:9px 18px;border-radius:8px;border:none;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.5px;}
.bp{background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0b0f;box-shadow:0 2px 12px rgba(245,183,0,0.3);}
.bp:hover{box-shadow:0 4px 20px rgba(245,183,0,0.5);transform:translateY(-1px);}
.bs{background:var(--card);border:1px solid var(--border);color:var(--text2);}
.bs:hover{border-color:var(--gold);color:var(--text);}
.bd{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.3);color:var(--red);}
.bd:hover{background:rgba(255,59,92,.2);}
.bb{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--blue);}
.bg{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--green);}
.timer-panel{background:var(--card);border:1px solid rgba(0,212,255,0.35);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.timer-panel-title{font-family:'Orbitron',monospace;font-size:11px;color:var(--blue);letter-spacing:1.5px;white-space:nowrap;}
.timer-display{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--gold);min-width:100px;text-align:center;text-shadow:0 0 16px rgba(245,183,0,0.4);}
.timer-display.running{color:var(--green);}
.timer-display.warn{color:var(--orange);animation:warnPulse 1s infinite;}
.timer-display.danger{color:var(--red);animation:warnPulse .5s infinite;}
@keyframes warnPulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.timer-inputs{display:flex;gap:8px;align-items:center;}
.timer-input{width:54px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Orbitron',monospace;font-size:14px;padding:6px 8px;text-align:center;outline:none;}
.timer-input:focus{border-color:var(--blue);}
.timer-sep{color:var(--text2);font-weight:700;font-size:16px;}
.timer-controls{display:flex;gap:8px;}
.tbtn{padding:8px 14px;border-radius:7px;border:none;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;}
.hbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.htab{padding:7px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text2);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
.htab.on{border-color:var(--gold);background:rgba(245,183,0,.1);color:var(--gold);}
.badd{padding:7px 14px;border:1px dashed var(--blue);border-radius:8px;background:transparent;color:var(--blue);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:visible;transition:.2s;}
.tcard:hover{border-color:rgba(245,183,0,.35);}
.tcard.elim{opacity:.5;border-color:var(--muted);}
.thead2{background:linear-gradient(135deg,rgba(245,183,0,.12),rgba(255,107,53,.08));padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);border-radius:12px 12px 0 0;}
.tnum{font-family:'Orbitron',monospace;font-size:10px;color:var(--gold);background:rgba(245,183,0,.15);padding:2px 7px;border-radius:4px;border:1px solid rgba(245,183,0,.3);}
.team-logo{width:34px;height:34px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:.2s;}
.team-logo img{width:100%;height:100%;object-fit:cover;border-radius:5px;}
.team-logo:hover{border-color:var(--gold);}
.logo-file-input{display:none;}
.tname{background:transparent;border:none;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;text-align:center;flex:1;cursor:pointer;outline:none;min-width:0;}
.tname:focus{background:rgba(255,255,255,.05);border-radius:4px;padding:2px 6px;}
.bdel{background:transparent;border:1px solid rgba(255,59,92,.3);color:var(--red);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.tbody2{padding:10px 14px;}
.prow{display:flex;gap:8px;margin-bottom:12px;justify-content:center;padding:4px 0;}
.pwrap{position:relative;display:inline-block;}
.pbtn{width:40px;height:40px;border-radius:50%;border:2px solid;font-size:10px;font-weight:700;font-family:'Orbitron',monospace;cursor:pointer;transition:.2s;}
.pbtn.alive{border-color:var(--green);background:rgba(0,255,136,.1);color:var(--green);}
.pbtn.knocked{border-color:var(--orange);background:rgba(255,107,53,.15);color:var(--orange);animation:pOrange 1.5s infinite;}
.pbtn.dead{border-color:var(--red);background:rgba(255,59,92,.1);color:var(--red);opacity:.6;}
@keyframes pOrange{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.4);}50%{box-shadow:0 0 0 6px rgba(255,107,53,0);}}
.pmenu{position:fixed;background:var(--bg2);border:1px solid rgba(245,183,0,.35);border-radius:10px;padding:5px;z-index:9999;min-width:100px;box-shadow:0 8px 32px rgba(0,0,0,.75);}
.popt{display:flex;align-items:center;gap:8px;width:100%;padding:7px 12px;border:none;background:transparent;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;text-align:right;cursor:pointer;border-radius:7px;transition:.15s;white-space:nowrap;color:var(--text);}
.popt:hover{background:rgba(255,255,255,.07);}
.popt-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.srow{display:flex;gap:7px;align-items:center;}
.sblk{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;text-align:center;}
.slbl{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-bottom:3px;}
.sval{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:var(--gold);}
.kctrl{display:flex;align-items:center;gap:5px;justify-content:center;}
.kbtn{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.kbtn:hover{background:var(--card);border-color:var(--gold);}
.psel{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:12px;padding:4px 7px;outline:none;cursor:pointer;}
.baddteam{display:flex;align-items:center;justify-content:center;gap:7px;padding:18px;border:2px dashed var(--border);border-radius:12px;background:transparent;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;cursor:pointer;width:100%;}
.baddteam:hover{border-color:var(--gold);color:var(--gold);}
.stable{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.stable th{padding:11px 14px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-align:right;background:var(--bg2);border-bottom:1px solid var(--border);}
.stable td{padding:9px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
.stable tr:last-child td{border-bottom:none;}
.pbadge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;}
.p1{background:var(--gold);color:#0a0b0f;}.p2{background:#c0c0c0;color:#0a0b0f;}.p3{background:#cd7f32;color:#0a0b0f;}.po{background:var(--bg2);color:var(--muted);border:1px solid var(--border);}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.dot.alive{background:var(--green);}.dot.knocked{background:var(--orange);}.dot.dead{background:rgba(255,59,92,.4);}
.movl{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:10000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.mdl{background:var(--bg2);border:1px solid rgba(245,183,0,.6);border-radius:16px;padding:26px;width:340px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.mdl h3{font-family:'Orbitron',monospace;font-size:15px;color:var(--gold);margin-bottom:14px;text-align:center;}
.minput{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;padding:9px 12px;outline:none;text-align:right;margin-bottom:14px;}
.minput:focus{border-color:var(--gold);}
.mbtns{display:flex;gap:10px;justify-content:flex-end;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:rgba(245,183,0,.3);border-radius:3px;}
</style>
</head>
<body>
<header class="hdr">
  <div class="logo">PUBG<span>TM</span> PRO <span class="conn-dot" id="connDot"></span></div>
  <nav class="nav">
    <button class="ntab on" onclick="showTab('admin')">🎮 ניהול</button>
    <button class="ntab" onclick="showTab('standings')">🏆 דירוג</button>
  </nav>
</header>
<main class="main" id="appRoot"></main>
<div id="modalRoot"></div>
<script>
const PLACEMENT_PTS={1:10,2:6,3:5,4:4,5:3,6:2,7:1};
const MAX_HOUSES=8,MAX_TEAMS=16,PASSWORD='95536';
let state={houses:[createHouse(1)],activeHouse:1};
let timerState={totalSeconds:600,remaining:600,running:false,inputMin:10,inputSec:0};

// ── SOCKET ──
const socket = io();
socket.on('connect', () => { document.getElementById('connDot').classList.add('ok'); });
socket.on('disconnect', () => { document.getElementById('connDot').classList.remove('ok'); });
socket.on('update', (data) => {
  if (data.state) { state = data.state; }
  if (data.timer) { timerState = data.timer; }
  render();
});

function push(timerCmd) {
  socket.emit('setState', { state, timer: timerCmd || timerState });
}

function createHouse(id){return{id,name:`בית ${id}`,teams:[]};}
function createTeam(id){return{id,name:`קבוצה ${id}`,logo:null,players:[{id:1,status:'alive'},{id:2,status:'alive'},{id:3,status:'alive'},{id:4,status:'alive'}],kills:0,totalKills:0,placement:null,placementPoints:0,totalPoints:0,eliminated:false};}
function getPts(p){return PLACEMENT_PTS[p]||0;}

// ── TIMER ──
function timerStart(){push({cmd:'start'});}
function timerPause(){push({cmd:'pause'});}
function timerReset(){const m=parseInt(document.getElementById('tInMin')?.value)||0;const s=parseInt(document.getElementById('tInSec')?.value)||0;push({cmd:'reset',totalSeconds:m*60+s,inputMin:m,inputSec:s});}
function timerSet(){const m=parseInt(document.getElementById('tInMin')?.value)||0;const s=parseInt(document.getElementById('tInSec')?.value)||0;push({cmd:'set',totalSeconds:m*60+s,inputMin:m,inputSec:s});}
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function renderTimerDisplay(){const el=document.getElementById('timerDisp');if(!el)return;const pct=timerState.totalSeconds>0?timerState.remaining/timerState.totalSeconds:0;let cls='timer-display';if(timerState.running)cls+=' running';if(pct<=0.25&&pct>0.1&&timerState.running)cls+=' warn';if(pct<=0.1&&timerState.running)cls+=' danger';el.className=cls;el.textContent=fmt(timerState.remaining);}

// ── TEAM ACTIONS ──
function addHouse(){if(state.houses.length>=MAX_HOUSES)return;const id=Math.max(...state.houses.map(h=>h.id))+1;state.houses.push(createHouse(id));state.activeHouse=id;push();}
function setActiveHouse(id){state.activeHouse=id;render();}
function addTeam(houseId){const h=state.houses.find(h=>h.id===houseId);if(!h||h.teams.length>=MAX_TEAMS)return;h.teams.push(createTeam(h.teams.length+1));push();}
function deleteTeam(houseId,teamId){const h=state.houses.find(h=>h.id===houseId);if(!h)return;h.teams=h.teams.filter(t=>t.id!==teamId).map((t,i)=>({...t,id:i+1}));push();}
function updateTeamName(houseId,teamId,name){const t=getTeam(houseId,teamId);if(t){t.name=name;push();}}
function updateKills(houseId,teamId,delta){const t=getTeam(houseId,teamId);if(!t)return;const nk=Math.max(0,t.kills+delta);t.totalPoints=t.totalPoints-t.kills+nk;t.kills=nk;push();}
function updatePlacement(houseId,teamId,place){const t=getTeam(houseId,teamId);if(!t)return;const old=t.placementPoints;t.placement=place?parseInt(place):null;t.placementPoints=getPts(t.placement);t.totalPoints=t.totalPoints-old+t.placementPoints;push();}
function updatePlayerStatus(houseId,teamId,playerId,status){const t=getTeam(houseId,teamId);if(!t)return;const wasAlive=t.players.find(p=>p.id===playerId)?.status!=='dead';t.players=t.players.map(p=>p.id===playerId?{...p,status}:p);const knocked=t.players.filter(p=>p.status==='knocked').length;const dead=t.players.filter(p=>p.status==='dead').length;if(dead>0&&knocked+dead===4)t.players=t.players.map(p=>({...p,status:'dead'}));t.eliminated=t.players.every(p=>p.status==='dead');push();if(status==='dead'&&wasAlive)showKillModal(t);}
function getTeam(houseId,teamId){const h=state.houses.find(h=>h.id===houseId);return h?h.teams.find(t=>t.id===teamId):null;}
function getAllTeams(){return state.houses.flatMap(h=>h.teams);}
function getSortedTeams(){return[...getAllTeams()].sort((a,b)=>{if(a.eliminated&&!b.eliminated)return 1;if(!a.eliminated&&b.eliminated)return-1;return b.totalPoints-a.totalPoints;});}
function startNewGame(){state.houses.forEach(h=>h.teams.forEach(t=>{t.players=t.players.map(p=>({...p,status:'alive'}));t.kills=0;t.placement=null;t.placementPoints=0;t.eliminated=false;}));push();}
function resetScores(){state.houses.forEach(h=>h.teams.forEach(t=>{t.kills=0;t.totalKills=0;t.placement=null;t.placementPoints=0;t.totalPoints=0;t.players=t.players.map(p=>({...p,status:'alive'}));t.eliminated=false;}));push();}
function fullReset(){state={houses:[createHouse(1)],activeHouse:1};push();}
function triggerLogoUpload(houseId,teamId){document.getElementById(`logoInput_${houseId}_${teamId}`)?.click();}
function handleLogoUpload(houseId,teamId,input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{const t=getTeam(houseId,teamId);if(t){t.logo=e.target.result;push();}};reader.readAsDataURL(file);}

// ── MODALS ──
function showKillModal(dyingTeam){const others=getAllTeams().filter(t=>t.id!==dyingTeam.id&&!t.eliminated);document.getElementById('modalRoot').innerHTML=`<div class="movl" id="km"><div class="mdl"><h3>מי קיבל את הקיל?</h3><p style="color:var(--text2);font-size:13px;margin-bottom:12px;text-align:center">${escHtml(dyingTeam.name)} נהרג</p><select class="minput" id="killTarget"><option value="">-- דלג --</option>${others.map(t=>`<option value="${t.id}">#${t.id} ${escHtml(t.name)}</option>`).join('')}</select><div class="mbtns"><button class="btn bs" onclick="closeModal()">דלג</button><button class="btn bp" onclick="assignKill()">הוסף קיל ✓</button></div></div></div>`;document.getElementById('km').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});}
function assignKill(){const sel=document.getElementById('killTarget');if(!sel||!sel.value){closeModal();return;}const tid=parseInt(sel.value);state.houses.forEach(h=>h.teams.forEach(t=>{if(t.id===tid){t.kills++;t.totalKills++;t.totalPoints++;}}));push();closeModal();}
function showResetScoresModal(){document.getElementById('modalRoot').innerHTML=`<div class="movl" onclick="if(event.target===this)closeModal()"><div class="mdl"><h3>איפוס ניקוד</h3><p style="color:var(--text2);font-size:13px;margin-bottom:16px;text-align:center">האם לאפס את כל הניקוד?</p><div class="mbtns"><button class="btn bs" onclick="closeModal()">ביטול</button><button class="btn bd" onclick="resetScores();closeModal()">אפס</button></div></div></div>`;}
function showFullResetModal(){document.getElementById('modalRoot').innerHTML=`<div class="movl" onclick="if(event.target===this)closeModal()"><div class="mdl"><h3>🔒 איפוס מלא</h3><p style="color:var(--text2);font-size:13px;margin-bottom:12px;text-align:center">הזן סיסמא:</p><input type="password" class="minput" id="pwdInput" placeholder="סיסמא..." onkeydown="if(event.key==='Enter')confirmFullReset()"><p id="pwdErr" style="color:var(--red);font-size:12px;margin-bottom:12px;text-align:center;display:none">שגויה!</p><div class="mbtns"><button class="btn bs" onclick="closeModal()">ביטול</button><button class="btn bd" onclick="confirmFullReset()">אפס הכל</button></div></div></div>`;setTimeout(()=>document.getElementById('pwdInput')?.focus(),50);}
function confirmFullReset(){const pwd=document.getElementById('pwdInput')?.value;if(pwd===PASSWORD){fullReset();closeModal();}else{const e=document.getElementById('pwdErr');if(e)e.style.display='block';}}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

// ── RENDER ──
let currentTab='admin';
function showTab(tab){currentTab=tab;document.querySelectorAll('.ntab').forEach((b,i)=>b.classList.toggle('on',['admin','standings'][i]===tab));render();}
function render(){const root=document.getElementById('appRoot');if(currentTab==='admin')root.innerHTML=renderAdmin();else root.innerHTML=renderStandings();renderTimerDisplay();}

function renderAdmin(){
  const h=state.houses.find(h=>h.id===state.activeHouse);
  const houseTabs=state.houses.map(h=>`<button class="htab${h.id===state.activeHouse?' on':''}" onclick="setActiveHouse(${h.id})">${h.name}</button>`).join('');
  const addHouseBtn=state.houses.length<MAX_HOUSES?`<button class="badd" onclick="addHouse()">+ בית חדש</button>`:'';
  const teams=h?h.teams.map(t=>renderTeamCard(h.id,t)).join(''):'';
  const addTeamBtn=h&&h.teams.length<MAX_TEAMS?`<button class="baddteam" onclick="addTeam(${h.id})">+ הוסף קבוצה</button>`:'';
  const isRunning=timerState.running;
  return `
  <div class="abar">
    <button class="btn bp" onclick="startNewGame()">🔄 משחק חדש</button>
    <button class="btn bs" onclick="showResetScoresModal()">📊 איפוס ניקוד</button>
    <button class="btn bd" onclick="showFullResetModal()">🗑️ איפוס מלא</button>
  </div>
  <div class="timer-panel">
    <span class="timer-panel-title">⏱ TIMER</span>
    <span id="timerDisp" class="timer-display${isRunning?' running':''}">${fmt(timerState.remaining)}</span>
    <div class="timer-inputs">
      <input type="number" class="timer-input" id="tInMin" min="0" max="99" value="${timerState.inputMin}" placeholder="MM">
      <span class="timer-sep">:</span>
      <input type="number" class="timer-input" id="tInSec" min="0" max="59" value="${timerState.inputSec}" placeholder="SS">
      <button class="tbtn bs" onclick="timerSet()">הגדר</button>
    </div>
    <div class="timer-controls">
      <button class="tbtn ${isRunning?'bd':'bg'}" onclick="${isRunning?'timerPause()':'timerStart()'}">${isRunning?'⏸ עצור':'▶ הפעל'}</button>
      <button class="tbtn bs" onclick="timerReset()">↺ איפוס</button>
    </div>
  </div>
  <div class="hbar">${houseTabs}${addHouseBtn}</div>
  <div class="tgrid">${teams}${addTeamBtn}</div>`;}

function renderTeamCard(houseId,t){
  const logoHtml=t.logo?`<img src="${t.logo}" alt="logo">`:`<span>🛡️</span>`;
  const players=t.players.map(p=>`<div class="pwrap"><button class="pbtn ${p.status}" data-hid="${houseId}" data-tid="${t.id}" data-pid="${p.id}">P${p.id}</button></div>`).join('');
  const placementOpts=Array.from({length:16},(_,i)=>i+1).map(n=>`<option value="${n}"${t.placement===n?'selected':''}>#${n}${PLACEMENT_PTS[n]?` (+${PLACEMENT_PTS[n]})`:''}  </option>`).join('');
  return `
  <div class="tcard${t.eliminated?' elim':''}">
    <div class="thead2">
      <span class="tnum">#${t.id}</span>
      <div class="team-logo" onclick="triggerLogoUpload(${houseId},${t.id})" title="לחץ להוספת לוגו">${logoHtml}</div>
      <input type="file" class="logo-file-input" id="logoInput_${houseId}_${t.id}" accept="image/*" onchange="handleLogoUpload(${houseId},${t.id},this)">
      <input class="tname" value="${escHtml(t.name)}" onblur="updateTeamName(${houseId},${t.id},this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      <button class="bdel" onclick="if(confirm('למחוק?'))deleteTeam(${houseId},${t.id})">✕</button>
    </div>
    <div class="tbody2">
      <div class="prow">${players}</div>
      <div class="srow">
        <div class="sblk"><div class="slbl">קילים</div><div class="kctrl"><button class="kbtn" onclick="updateKills(${houseId},${t.id},-1)">−</button><span class="sval">${t.kills}</span><button class="kbtn" onclick="updateKills(${houseId},${t.id},1)">+</button></div></div>
        <div class="sblk"><div class="slbl">מיקום</div><select class="psel" onchange="updatePlacement(${houseId},${t.id},this.value)"><option value="">-</option>${placementOpts}</select></div>
        <div class="sblk"><div class="slbl">סה"כ</div><div class="sval">${t.totalPoints}</div></div>
      </div>
    </div>
  </div>`;}

function renderStandings(){
  const sorted=getSortedTeams();
  const rows=sorted.map((t,i)=>{const pos=i+1;const cls=pos<=3?`p${pos}`:'po';const dots=t.players.map(p=>`<span class="dot ${p.status}"></span>`).join('');const logoCell=t.logo?`<img src="${t.logo}" style="width:22px;height:22px;border-radius:4px;object-fit:cover;vertical-align:middle;margin-left:6px;">`:'';return`<tr><td><span class="pbadge ${cls}">${pos}</span></td><td style="font-weight:700;color:${t.eliminated?'var(--muted)':'var(--text)'}">${logoCell}${escHtml(t.name)}${t.eliminated?'<span style="margin-right:7px;font-size:11px;color:var(--red)">✕</span>':''}</td><td><div style="display:flex;gap:4px">${dots}</div></td><td style="font-family:Orbitron,monospace;color:var(--orange)">${t.kills}</td><td style="color:var(--blue)">+${t.placementPoints}</td><td style="font-family:Orbitron,monospace;font-size:15px;font-weight:700;color:var(--gold)">${t.totalPoints}</td></tr>`;}).join('');
  return`<table class="stable"><thead><tr><th>מקום</th><th>קבוצה</th><th>שחקנים</th><th>קילים</th><th>נק' מיקום</th><th>סה"כ</th></tr></thead><tbody>${rows}</tbody></table>`;}

// ── PLAYER MENU ──
document.addEventListener('click',function(e){
  const btn=e.target.closest('.pbtn');
  if(btn){
    e.stopPropagation();
    document.querySelectorAll('.pmenu').forEach(m=>m.remove());
    const houseId=parseInt(btn.dataset.hid),teamId=parseInt(btn.dataset.tid),playerId=parseInt(btn.dataset.pid);
    const t=getTeam(houseId,teamId);if(!t)return;
    const p=t.players.find(p=>p.id===playerId);if(!p)return;
    const menu=document.createElement('div');menu.className='pmenu';
    [{s:'alive',l:'חי',c:'#00ff88'},{s:'knocked',l:'נוק',c:'#ff6b35'},{s:'dead',l:'מת',c:'#ff3b5c'}].forEach(({s,l,c})=>{
      const b=document.createElement('button');b.className='popt';
      b.innerHTML=`<span class="popt-dot" style="background:${c}"></span>${l}`;
      if(p.status===s)b.style.background='rgba(255,255,255,.06)';
      b.onclick=ev=>{ev.stopPropagation();updatePlayerStatus(houseId,teamId,playerId,s);menu.remove();};
      menu.appendChild(b);
    });
    document.body.appendChild(menu);
    const rect=btn.getBoundingClientRect();
    let top=rect.bottom+6;if(top+115>window.innerHeight-10)top=rect.top-121;
    let left=rect.left+rect.width/2-50;if(left<6)left=6;if(left+100>window.innerWidth-6)left=window.innerWidth-106;
    menu.style.top=top+'px';menu.style.left=left+'px';
    setTimeout(()=>document.addEventListener('click',()=>menu.remove(),{once:true}),10);
  }
});
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
render();
</script>
</body>
</html>
